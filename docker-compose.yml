include:
  - apps/pgvector/docker-compose.yml
  - apps/redis/docker-compose.yml
  - apps/traefik/docker-compose.yml
  - apps/cloudflared/docker-compose.yml
  - apps/loki/docker-compose.yml
  - apps/alloy/docker-compose.yml
  - apps/grafana/docker-compose.yml
  - apps/bazarr/docker-compose.yml
  - apps/decypharr/docker-compose.yml
  - apps/plex/docker-compose.yml
  - apps/profilarr/docker-compose.yml
  - apps/prowlarr/docker-compose.yml
  - apps/radarr/docker-compose.yml
  - apps/seerr/docker-compose.yml
  - apps/newtarr/docker-compose.yml
  - apps/sonarr/docker-compose.yml
  - apps/tautulli/docker-compose.yml
  - apps/byparr/docker-compose.yml
  - apps/zilean/docker-compose.yml
  - apps/prometheus/docker-compose.yml
  - apps/exportarr/docker-compose.yml
  - apps/restic/docker-compose.yml
  - apps/adguard/docker-compose.yml
  - apps/anibridge/docker-compose.yml

services:
  loki:
    depends_on:
      traefik:
        condition: service_healthy

  alloy:
    depends_on:
      loki:
        condition: service_healthy

  grafana:
    depends_on:
      traefik:
        condition: service_healthy
      loki:
        condition: service_healthy
      prometheus:
        condition: service_healthy

  plex:
    depends_on:
      traefik:
        condition: service_healthy
      decypharr:
        condition: service_healthy

  prowlarr:
    depends_on:
      traefik:
        condition: service_healthy

  decypharr:
    depends_on:
      traefik:
        condition: service_healthy

  profilarr:
    depends_on:
      traefik:
        condition: service_healthy

  radarr:
    depends_on:
      traefik:
        condition: service_healthy
      prowlarr:
        condition: service_healthy

  sonarr:
    depends_on:
      traefik:
        condition: service_healthy
      prowlarr:
        condition: service_healthy

  newtarr:
    depends_on:
      traefik:
        condition: service_healthy

  bazarr:
    depends_on:
      radarr:
        condition: service_healthy
      sonarr:
        condition: service_healthy


  tautulli:
    depends_on:
      traefik:
        condition: service_healthy
      plex:
        condition: service_started

  adguard:
    depends_on:
      traefik:
        condition: service_healthy

  prometheus:
    depends_on:
      traefik:
        condition: service_healthy

  exportarr_sonarr:
    depends_on:
      sonarr:
        condition: service_healthy

  exportarr_radarr:
    depends_on:
      radarr:
        condition: service_healthy

  exportarr_prowlarr:
    depends_on:
      prowlarr:
        condition: service_healthy

  exportarr_bazarr:
    depends_on:
      bazarr:
        condition: service_healthy

  postgres_exporter:
    depends_on:
      pgvector:
        condition: service_healthy

  redis_exporter:
    depends_on:
      redis:
        condition: service_healthy

  seerr:
    depends_on:
      radarr:
        condition: service_healthy
      sonarr:
        condition: service_healthy

  anibridge:
    depends_on:
      traefik:
        condition: service_healthy
