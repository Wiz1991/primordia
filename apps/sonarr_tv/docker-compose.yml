services:
  sonarr_tv:
    image: lscr.io/linuxserver/sonarr:4.0.16
    container_name: sonarr_tv
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ${APPDATA_DIR}/sonarr_tv:/config
      - /mnt:/mnt:rshared
    labels:
      - traefik.enable=true
      - traefik.http.routers.sonarr-tv.rule=Host(`sonarr-tv.${DOMAIN_NAME}`)
      - traefik.http.routers.sonarr-tv.entrypoints=websecure
      - traefik.http.routers.sonarr-tv.tls.certresolver=letsencrypt
      - traefik.http.routers.sonarr-tv.middlewares=security-headers@file
      - traefik.http.services.sonarr-tv.loadbalancer.server.port=8989
    healthcheck:
      test: curl -f http://localhost:8989/ping || exit 1
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - traefik
    restart: unless-stopped

networks:
  traefik:
    external: true
