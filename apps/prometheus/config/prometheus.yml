global:
  scrape_interval: 60s
  evaluation_interval: 60s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - localhost:9090

  - job_name: sonarr
    static_configs:
      - targets:
          - exportarr_sonarr:9707

  - job_name: radarr
    static_configs:
      - targets:
          - exportarr_radarr:9708

  - job_name: prowlarr
    static_configs:
      - targets:
          - exportarr_prowlarr:9709

  - job_name: bazarr
    static_configs:
      - targets:
          - exportarr_bazarr:9710
