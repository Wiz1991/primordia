services:
  restic_backup:
    image: mazzolino/restic:1.7.2
    container_name: restic_backup
    environment:
      - TZ=${TZ}
      - RESTIC_REPOSITORY=s3:https://${R2_ACCOUNT_ID}.r2.cloudflarestorage.com/${R2_BUCKET_NAME}
      - RESTIC_PASSWORD=${RESTIC_PASSWORD}
      - AWS_ACCESS_KEY_ID=${R2_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${R2_SECRET_ACCESS_KEY}
      - RESTIC_BACKUP_SOURCES=/data
      - RESTIC_BACKUP_ARGS=--exclude-file /excludes.txt --verbose
      - BACKUP_CRON=0 0 2 * * *
      - RUN_ON_STARTUP=false
    volumes:
      - ${APPDATA_DIR}:/data:ro
      - ./config/excludes.txt:/excludes.txt:ro
    restart: unless-stopped

  restic_prune:
    image: mazzolino/restic:1.7.2
    container_name: restic_prune
    environment:
      - TZ=${TZ}
      - RESTIC_REPOSITORY=s3:https://${R2_ACCOUNT_ID}.r2.cloudflarestorage.com/${R2_BUCKET_NAME}
      - RESTIC_PASSWORD=${RESTIC_PASSWORD}
      - AWS_ACCESS_KEY_ID=${R2_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${R2_SECRET_ACCESS_KEY}
      - PRUNE_CRON=0 0 4 * * 0
      - RESTIC_FORGET_ARGS=--keep-daily 7 --keep-weekly 4 --keep-monthly 6 --keep-yearly 2
    restart: unless-stopped
