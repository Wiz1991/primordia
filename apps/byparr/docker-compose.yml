services:
  byparr:
    image: ghcr.io/thephaseless/byparr:latest
    container_name: byparr
    environment:
      - LOG_LEVEL=debug
      - TZ=${TZ}
    healthcheck:
      test: ["CMD", "curl", "-sf", "--max-time", "15", "http://localhost:8191/health"]
      interval: 30s
      timeout: 30s
      retries: 5
      start_period: 30s
    networks:
      - traefik
    restart: unless-stopped

networks:
  traefik:
    external: true
