services:
  loki:
    image: grafana/loki:3.4.2
    container_name: loki
    command: -config.file=/etc/loki/loki.yml
    volumes:
      - ./config/loki.yml:/etc/loki/loki.yml:ro
      - loki_data:/loki
    healthcheck:
      test: wget --no-verbose --tries=1 --spider http://localhost:3100/ready || exit 1
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - traefik
    restart: unless-stopped

volumes:
  loki_data:

networks:
  traefik:
    external: true
