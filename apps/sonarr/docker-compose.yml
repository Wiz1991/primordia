services:
  sonarr_anime:
    image: lscr.io/linuxserver/sonarr:4.0.16
    container_name: sonarr_anime
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ${APPDATA_DIR}/sonarr/anime:/config
      - /mnt:/mnt:rshared
    labels:
      - traefik.enable=true
      - traefik.http.routers.sonarr_anime.rule=Host(`anime.sonarr.${DOMAIN_NAME}`)
      - traefik.http.routers.sonarr_anime.entrypoints=websecure
      - traefik.http.routers.sonarr_anime.tls.certresolver=letsencrypt
      - traefik.http.routers.sonarr_anime.middlewares=security-headers@file
      - traefik.http.services.sonarr_anime.loadbalancer.server.port=8989
    healthcheck:
      test: curl -f http://localhost:8989/ping || exit 1
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - traefik
    restart: unless-stopped


  sonarr_tv:
    image: lscr.io/linuxserver/sonarr:4.0.16
    container_name: sonarr_tv
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ${APPDATA_DIR}/sonarr/tv:/config
      - /mnt:/mnt:rshared
    labels:
      - traefik.enable=true
      - traefik.http.routers.sonarr_tv.rule=Host(`sonarr.${DOMAIN_NAME}`)
      - traefik.http.routers.sonarr_tv.entrypoints=websecure
      - traefik.http.routers.sonarr_tv.tls.certresolver=letsencrypt
      - traefik.http.routers.sonarr_tv.middlewares=security-headers@file
      - traefik.http.services.sonarr_tv.loadbalancer.server.port=8989
    healthcheck:
      test: curl -f http://localhost:8989/ping || exit 1
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - traefik
    restart: unless-stopped

networks:
  traefik:
    external: true
