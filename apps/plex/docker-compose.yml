services:
  plex:
    image: lscr.io/linuxserver/plex:1.43.0
    container_name: plex
    network_mode: host
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
      - VERSION=docker
      - PLEX_CLAIM=${PLEX_CLAIM}
    volumes:
      - ${APPDATA_DIR}/plex:/config
      - /mnt/media:/mnt:rslave
    devices:
      - /dev/dri:/dev/dri
    restart: unless-stopped
